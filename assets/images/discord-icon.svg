<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .discord-bg { fill: #0a0e27; }
      .discord-icon { fill: #9d4edd; }
      .discord-icon-light { fill: #c77dff; }
      .discord-border { stroke: #c77dff; stroke-width: 0.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" class="discord-bg"/>

  <!-- Discord Icon -->
  <g transform="translate(50, 50)">
    <!-- Main body circles -->
    <circle cx="-15" cy="-8" r="7" class="discord-icon"/>
    <circle cx="0" cy="-12" r="8" class="discord-icon"/>
    <circle cx="15" cy="-8" r="7" class="discord-icon"/>

    <!-- Connecting lines (speech bubbles) -->
    <path d="M -22,-5 L -22,8 Q -22,12 -18,12 L -12,12 L -12,16 L -8,12 L 8,12 Q 12,12 12,8 L 12,-8 Q 12,-12 8,-12 L -18,-12 Q -22,-12 -22,-8 Z"
          class="discord-icon" opacity="0.7" stroke="#c77dff" stroke-width="0.3" stroke-linejoin="round"/>

    <!-- Inner light accent -->
    <circle cx="0" cy="-12" r="5.5" class="discord-icon-light" opacity="0.6"/>

    <!-- Highlight star -->
    <g transform="translate(20, -15)">
      <path d="M 0,-3 L 1,-1 L 3,-1 L 1,1 L 2,3 L 0,2 L -2,3 L -1,1 L -3,-1 L -1,-1 Z"
            class="discord-icon-light" opacity="0.8"/>
    </g>
  </g>

  <!-- Border -->
  <rect x="2" y="2" width="96" height="96" fill="none" class="discord-border" opacity="0.5"/>

  <!-- Corner accents -->
  <circle cx="5" cy="5" r="1.5" class="discord-icon-light" opacity="0.5"/>
  <circle cx="95" cy="95" r="1.5" class="discord-icon-light" opacity="0.5"/>
</svg>
